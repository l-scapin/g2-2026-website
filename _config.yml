## Esempio Google Fonts per importare Space Mono
googlefonts:
  - url: "https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"

chulapa-skin:
  skin:  "journal" # temi disponibili: "sbd" "pixel" "graymor" "gitdev-dark" "gitdev" "universal" "academia" "gitdev" "towards" "pear" "twitter-lights-out" "twitter-dim" "wandoo" "lymcha" "twitter" "chulapa" "sunset" "minty" "lux" "journal" "deeply"
  vars:
    # Palette a due poli Nord/Sud
    primary:   "#177E89"   # freddo = Nord / concluso (link, accenti)
    secondary: "#D1573B"   # caldo  = Sud / a rischio
    # font-family-base:  "Space Mono"


#chulapa-skin: (alternativa a skin prefatte, sempre automatizzate ma in base a un colore)
#  autothemer  :  true
#  vars:
#    primary: "#07286E"



##################################################
#    Non modificare nulla sotto questa riga      #
##################################################

# Impostazioni di build
#theme: chulapa-jekyll # va usato il remote-theme!!!
plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache

collections:
  pages:
    output: true
    permalink: /:path

footer:
  links:
  - label: "LinkedIn"
    icon: "fab fa-linkedin"
    url: https://www.linkedin.com/company/sobigdata
  - label: "Twitter"
    icon: "fab fa-twitter"
    url: https://www.twitter.com/sobigdata
  copyright: "2026 SoBigData RI"


sass:
  quiet_deps: true

# Gli elementi esclusi possono essere elaborati elencando esplicitamente le directory o
# i relativi percorsi file nella lista `include:`.
#
exclude:
 - .sass-cache/
 - .jekyll-cache/
 - gemfiles/
 - Gemfile
 - Gemfile.lock
 - node_modules/
 - vendor/bundle/
 - vendor/cache/
 - vendor/gems/
 - vendor/ruby/
 - .idea/


livereload: true

remote_theme: dieghernan/chulapa

future: true

defaults:
  - scope:
      path: "assets/images/thumb-charts"
    values:
      image_col: charts
